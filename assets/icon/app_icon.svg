<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E6F0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with rounded corners -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGradient)"/>
  
  <!-- Main icon: Store/Inventory management symbol -->
  <g transform="translate(512, 512)">
    <!-- Storefront building -->
    <path d="M -200 -50 L -200 150 L -150 150 L -150 100 L 150 100 L 150 150 L 200 150 L 200 -50 Z" 
          fill="url(#iconGradient)" stroke="#FFFFFF" stroke-width="8"/>
    
    <!-- Roof/Awnings -->
    <path d="M -220 -50 L 0 -150 L 220 -50 Z" 
          fill="#FFFFFF" stroke="url(#iconGradient)" stroke-width="6"/>
    
    <!-- Door -->
    <rect x="-60" y="20" width="50" height="80" rx="5" fill="#3B82F6"/>
    <circle cx="-25" cy="60" r="4" fill="#FFFFFF"/>
    
    <!-- Display window -->
    <rect x="20" y="20" width="80" height="80" rx="5" fill="#E0E6F0" stroke="#3B82F6" stroke-width="4"/>
    
    <!-- Products/Boxes inside window -->
    <rect x="30" y="30" width="25" height="25" fill="#3B82F6" opacity="0.7"/>
    <rect x="65" y="30" width="25" height="25" fill="#1E40AF" opacity="0.7"/>
    <rect x="30" y="65" width="25" height="25" fill="#1E40AF" opacity="0.7"/>
    <rect x="65" y="65" width="25" height="25" fill="#3B82F6" opacity="0.7"/>
    
    <!-- Barcode scanner symbol -->
    <g transform="translate(0, -180)">
      <rect x="-40" y="-15" width="80" height="30" rx="5" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3"/>
      <line x1="-25" y1="-10" x2="-25" y2="10" stroke="#3B82F6" stroke-width="3"/>
      <line x1="-15" y1="-10" x2="-15" y2="10" stroke="#3B82F6" stroke-width="3"/>
      <line x1="-5" y1="-10" x2="-5" y2="10" stroke="#3B82F6" stroke-width="3"/>
      <line x1="5" y1="-10" x2="5" y2="10" stroke="#3B82F6" stroke-width="3"/>
      <line x1="15" y1="-10" x2="15" y2="10" stroke="#3B82F6" stroke-width="3"/>
      <line x1="25" y1="-10" x2="25" y2="10" stroke="#3B82F6" stroke-width="3"/>
    </g>
    
    <!-- Sales/Chart symbol -->
    <g transform="translate(180, 180)">
      <rect x="-30" y="-30" width="60" height="60" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3"/>
      <rect x="-20" y="10" width="8" height="15" fill="#3B82F6"/>
      <rect x="-8" y="0" width="8" height="25" fill="#1E40AF"/>
      <rect x="4" y="-5" width="8" height="30" fill="#3B82F6"/>
      <rect x="16" y="-10" width="8" height="35" fill="#1E40AF"/>
    </g>
  </g>
  
  <!-- Subtle shadow effect -->
  <ellipse cx="512" cy="950" rx="300" ry="50" fill="#000000" opacity="0.2"/>
</svg>
